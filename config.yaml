# Harness Configuration
# Reference: https://www.anthropic.com/engineering/harness-design-long-running-apps

model:
  planner: "claude-sonnet-4-20250514"
  generator: "claude-sonnet-4-20250514"   # Used by Claude Code SDK
  evaluator: "claude-sonnet-4-20250514"
  max_tokens: 16384

orchestrator:
  max_rounds: 3                # Generator ↔ Evaluator max loop count
  cost_limit_usd: 50.0         # Single run cost cap
  timeout_minutes: 180         # Single run timeout
  auto_continue_delay_sec: 3   # Delay between sessions (from reference)
  artifact_dir: "./artifacts"
  output_dir: "./output/project"
  log_dir: "./logs"

planner:
  enable_ai_features: true     # Suggest AI features in the spec
  ambition_level: "high"       # low / medium / high
  feature_count: 50            # Target features in feature_list.json (reference uses 200)

generator:
  max_turns: 1000              # Max tool turns per session (from reference)
  git_enabled: true
  dev_server:
    frontend_port: 5173
    backend_port: 8000

evaluator:
  criteria_file: "./criteria/fullstack.yaml"
  pass_policy: "all_above_threshold"   # any dimension below threshold → FAIL
  playwright:
    headless: true
    screenshot_on_fail: true
    timeout_ms: 30000
